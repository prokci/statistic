site_name: My Data Science Learning Project
theme:
  name: material

plugins:
  - mkdocs-jupyter

nav:
  - Home: index.md
  - The Delta Method Explained: The Delta Method Explained.ipynb

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js